<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mukul Oli — AI Voice Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg-primary:#0a0a1a;--bg-glass:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.08);--text-primary:#e8e8f0;--text-secondary:#8888a8;--accent-1:#6c63ff;--accent-2:#00d4aa;--accent-glow:rgba(108,99,255,0.3);--user-bubble:rgba(108,99,255,0.15);--bot-bubble:rgba(0,212,170,0.1);--danger:#ff4757}
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg-primary);color:var(--text-primary);overflow:hidden}
        .bg-glow{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
        .bg-glow::before,.bg-glow::after{content:'';position:absolute;border-radius:50%;filter:blur(120px);opacity:0.4;animation:float 12s ease-in-out infinite alternate}
        .bg-glow::before{width:500px;height:500px;background:radial-gradient(circle,var(--accent-1),transparent 70%);top:-100px;left:-100px}
        .bg-glow::after{width:400px;height:400px;background:radial-gradient(circle,var(--accent-2),transparent 70%);bottom:-80px;right:-80px;animation-delay:-6s}
        @keyframes float{0%{transform:translate(0,0) scale(1)}100%{transform:translate(60px,40px) scale(1.15)}}
        .app{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;max-width:720px;margin:0 auto}
        .header{display:flex;align-items:center;gap:14px;padding:20px 24px 16px;padding-top:calc(20px + env(safe-area-inset-top, 0px));border-bottom:1px solid var(--border)}
        .avatar{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--accent-1),var(--accent-2));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0}
        .header-info{min-width:0;flex:1}
        .header-info h1{font-size:1.1rem;font-weight:600}
        .header-info p{font-size:.78rem;color:var(--text-secondary);margin-top:2px}
        .header-info .status-dot{display:inline-block;width:7px;height:7px;background:var(--accent-2);border-radius:50%;margin-right:5px;animation:blink 2s ease-in-out infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        .header-actions{margin-left:auto;display:flex;gap:8px}
        .header-btn{background:var(--bg-glass);border:1px solid var(--border);color:var(--text-secondary);width:38px;height:38px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s}
        .header-btn:hover{color:var(--text-primary);background:rgba(255,255,255,.08)}
        .chat-area{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
        .chat-area::-webkit-scrollbar{width:4px}
        .chat-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
        .msg-row{display:flex;gap:10px;max-width:88%;animation:msgIn .35s cubic-bezier(.16,1,.3,1)}
        .msg-row.user{align-self:flex-end;flex-direction:row-reverse}
        .msg-row.bot{align-self:flex-start}
        @keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
        .msg-avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;margin-top:2px}
        .msg-row.bot .msg-avatar{background:linear-gradient(135deg,var(--accent-1),var(--accent-2));color:#fff}
        .msg-row.user .msg-avatar{background:rgba(108,99,255,.25);color:var(--accent-1)}
        .msg-bubble{padding:12px 16px;border-radius:16px;font-size:.9rem;line-height:1.55;word-break:break-word;overflow-wrap:anywhere}
        .msg-row.user .msg-bubble{background:var(--user-bubble);border:1px solid rgba(108,99,255,.15);border-bottom-right-radius:4px}
        .msg-row.bot .msg-bubble{background:var(--bot-bubble);border:1px solid rgba(0,212,170,.1);border-bottom-left-radius:4px}
        .msg-time{font-size:.68rem;color:var(--text-secondary);margin-top:4px;opacity:.7}
        .msg-row.user .msg-time{text-align:right}
        .typing-indicator{display:none;align-self:flex-start;padding:10px 18px;background:var(--bot-bubble);border:1px solid rgba(0,212,170,.1);border-radius:16px;border-bottom-left-radius:4px;gap:5px}
        .typing-indicator.show{display:flex}
        .typing-indicator span{width:7px;height:7px;background:var(--accent-2);border-radius:50%;animation:typeDot 1.4s ease-in-out infinite}
        .typing-indicator span:nth-child(2){animation-delay:.2s}
        .typing-indicator span:nth-child(3){animation-delay:.4s}
        @keyframes typeDot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
        .welcome{text-align:center;padding:40px 20px;animation:msgIn .5s ease}
        .welcome-icon{font-size:48px;margin-bottom:16px}
        .welcome h2{font-size:1.3rem;font-weight:600;margin-bottom:6px}
        .welcome p{font-size:.85rem;color:var(--text-secondary);max-width:380px;margin:0 auto 20px;line-height:1.5}
        .welcome-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
        .welcome-chip{background:var(--bg-glass);border:1px solid var(--border);color:var(--text-secondary);padding:8px 14px;border-radius:20px;font-size:.78rem;cursor:pointer;transition:all .2s}
        .welcome-chip:hover{background:var(--user-bubble);color:var(--text-primary);border-color:rgba(108,99,255,.3)}
        .input-bar{padding:16px 24px 24px;padding-bottom:calc(24px + env(safe-area-inset-bottom, 0px));border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
        .input-wrap{flex:1;min-width:0}
        .input-wrap input{width:100%;padding:13px 16px;border:1px solid var(--border);border-radius:14px;background:var(--bg-glass);color:var(--text-primary);font-size:.9rem;font-family:inherit;outline:none;transition:border .2s}
        .input-wrap input:focus{border-color:var(--accent-1);box-shadow:0 0 0 3px var(--accent-glow)}
        .input-wrap input::placeholder{color:var(--text-secondary)}
        .send-btn{width:46px;height:46px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--accent-1),#8b5cf6);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.15rem;transition:all .2s;flex-shrink:0}
        .send-btn:hover{transform:scale(1.05);box-shadow:0 4px 20px var(--accent-glow)}
        .mic-btn{width:46px;height:46px;border-radius:14px;border:1px solid var(--border);background:var(--bg-glass);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:all .25s;flex-shrink:0}
        .mic-btn:hover{color:var(--text-primary);background:rgba(255,255,255,.08)}
        .mic-btn.active{background:rgba(0,212,170,.15);border-color:var(--accent-2);color:var(--accent-2);box-shadow:0 0 20px rgba(0,212,170,.15)}
        .mic-btn.listening{background:rgba(255,71,87,.15);border-color:var(--danger);color:var(--danger);animation:micPulse 1.5s ease-in-out infinite}
        @keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,71,87,.3)}50%{box-shadow:0 0 0 10px rgba(255,71,87,0)}}
        .status-bar{text-align:center;padding:0 24px;min-height:22px}
        .status-bar p{font-size:.75rem;color:var(--text-secondary);letter-spacing:.3px}
        @media(max-width:600px){
            .app{max-width:100%}
            .header{padding:14px 16px 12px;padding-top:calc(14px + env(safe-area-inset-top, 0px));gap:10px}
            .avatar{width:40px;height:40px;font-size:18px;border-radius:10px}
            .chat-area{padding:14px 16px}
            .welcome{padding:20px 10px}
            .welcome-icon{font-size:36px;margin-bottom:10px}
            .welcome h2{font-size:1.15rem}
            .welcome p{margin-bottom:14px}
            .input-bar{padding:12px 16px 20px;padding-bottom:calc(20px + env(safe-area-inset-bottom, 0px));gap:8px}
            .send-btn, .mic-btn{width:42px;height:42px;border-radius:12px;font-size:1rem}
            .input-wrap input{padding:11px 14px;border-radius:12px;font-size:0.88rem}
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="app">
        <div class="header">
            <div class="avatar">M</div>
            <div class="header-info">
                <h1>Mukul Oli</h1>
                <p><span class="status-dot"></span>AI Developer • Voice Bot</p>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="clear-btn" title="New conversation">🗑️</button>
            </div>
        </div>
        <div class="chat-area" id="chat-box">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">🎙️</div>
                <h2>Hey, I'm Mukul!</h2>
                <p>AI Developer at Webuters Technologies. Click the mic for real-time voice conversation.</p>
                <div class="welcome-chips">
                    <span class="welcome-chip" data-q="What's your life story?">Life story</span>
                    <span class="welcome-chip" data-q="What's your number one superpower?">Superpower</span>
                    <span class="welcome-chip" data-q="What are your top 3 growth areas?">Growth areas</span>
                    <span class="welcome-chip" data-q="Tell me about your projects">Projects</span>
                    <span class="welcome-chip" data-q="What skills do you have?">Skills</span>
                </div>
            </div>
            <div class="typing-indicator" id="typing"><span></span><span></span><span></span></div>
        </div>
        <div class="status-bar"><p id="status"></p></div>
        <div class="input-bar">
            <div class="input-wrap">
                <input type="text" id="msg-input" placeholder="Ask me anything..." autocomplete="off">
            </div>
            <button class="send-btn" id="send-btn" title="Send">➤</button>
            <button class="mic-btn" id="mic-btn" title="Voice conversation">🎤</button>
        </div>
    </div>

<script>
// ===================== DOM =====================
const chatBox=document.getElementById('chat-box'), msgInput=document.getElementById('msg-input'),
      sendBtn=document.getElementById('send-btn'), micBtn=document.getElementById('mic-btn'),
      statusEl=document.getElementById('status'), typingEl=document.getElementById('typing'),
      welcomeEl=document.getElementById('welcome'), clearBtn=document.getElementById('clear-btn');
let sessionId=null, voiceModeOn=false, isBotSpeaking=false, isProcessing=false;
let liveMode=false; // true = Gemini Live API, false = SpeechRecognition fallback

function timeNow(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
function addMsg(t,type){
    if(welcomeEl)welcomeEl.style.display='none';
    const r=document.createElement('div');r.className=`msg-row ${type}`;
    r.innerHTML=`<div class="msg-avatar">${type==='bot'?'M':'🧑'}</div><div><div class="msg-bubble">${t}</div><div class="msg-time">${timeNow()}</div></div>`;
    chatBox.insertBefore(r,typingEl);chatBox.scrollTop=chatBox.scrollHeight;
}
function showTyping(v){typingEl.classList.toggle('show',v);if(v)chatBox.scrollTop=chatBox.scrollHeight}

// ===================== VOICE SELECTION (for fallback TTS) =====================
let selectedVoice=null;
function loadVoices(){
    const v=speechSynthesis.getVoices();if(!v.length)return;
    for(const n of['microsoft david','google uk english male','microsoft mark','microsoft ravi','alex','daniel']){
        const f=v.find(x=>x.name.toLowerCase().includes(n));if(f){selectedVoice=f;break;}
    }
    if(!selectedVoice)selectedVoice=v.find(x=>x.lang.startsWith('en'))||v[0];
    // Pre-warm TTS
    const w=new SpeechSynthesisUtterance('');w.volume=0;if(selectedVoice)w.voice=selectedVoice;speechSynthesis.speak(w);
}
if('speechSynthesis'in window){speechSynthesis.onvoiceschanged=loadVoices;loadVoices()}


// ======================================================================
//  LIVE MODE — Gemini Live API (WebSocket, direct audio streaming)
// ======================================================================
const GEMINI_WS='wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent';
let ws=null, liveActive=false, micStream=null, audioCtx=null, workletNode=null;
let playCtx=null, nextPlayTime=0;
let pendingUserText='', pendingBotText='', userMsgEl=null, botMsgEl=null;

async function startLiveMode(){
    statusEl.textContent='🔄 Connecting to Gemini Live...';
    try{
        const cfg=await(await fetch('/config')).json();
        ws=new WebSocket(`${GEMINI_WS}?key=${cfg.api_key}`);

        ws.onopen=()=>{
            console.log('🔌 WS connected, sending setup...');
            ws.send(JSON.stringify({
                setup:{
                    model:`models/${cfg.model}`,
                    generation_config:{
                        response_modalities:["AUDIO"],
                        speech_config:{voice_config:{prebuilt_voice_config:{voice_name:"Puck"}}}
                    },
                    system_instruction:{parts:[{text:cfg.system_prompt}]}
                }
            }));
        };

        ws.onmessage=handleLiveMsg;

        ws.onerror=(e)=>{
            console.error('❌ WS error:',e);
            statusEl.textContent='❌ Live API failed — switching to fallback...';
            stopLiveMode();
            setTimeout(()=>startFallbackMode(),500);
        };

        ws.onclose=(e)=>{
            console.log('WS closed:',e.code,e.reason);
            if(liveActive){
                statusEl.textContent='🔌 Disconnected — switching to fallback...';
                stopLiveMode();
                setTimeout(()=>startFallbackMode(),500);
            }
        };

    }catch(e){
        console.error('Live start error:',e);
        statusEl.textContent='❌ Live failed — using fallback...';
        setTimeout(()=>startFallbackMode(),500);
    }
}

function handleLiveMsg(event){
    let data;
    try{data=JSON.parse(event.data)}catch(e){return}

    if(data.setupComplete){
        liveActive=true;liveMode=true;
        micBtn.classList.add('listening');
        statusEl.textContent='🎙️ LIVE — Just speak naturally';
        startMicCapture();
        return;
    }

    if(data.serverContent){
        const sc=data.serverContent;
        if(sc.modelTurn?.parts){
            for(const p of sc.modelTurn.parts){
                if(p.inlineData){isBotSpeaking=true;micBtn.classList.remove('listening');micBtn.classList.add('active');statusEl.textContent='🔊 Speaking...';playAudioChunk(p.inlineData.data,p.inlineData.mimeType)}
                if(p.text)appendBotTranscript(p.text);
            }
        }
        if(sc.turnComplete){isBotSpeaking=false;micBtn.classList.remove('active');micBtn.classList.add('listening');statusEl.textContent='🎙️ LIVE — Just speak';finalizeBotMsg()}
        if(sc.interrupted){clearPlayback();isBotSpeaking=false;micBtn.classList.remove('active');micBtn.classList.add('listening');statusEl.textContent='🎙️ Listening...';finalizeBotMsg()}
        if(sc.inputTranscription?.text)appendUserTranscript(sc.inputTranscription.text);
        if(sc.outputTranscription?.text)appendBotTranscript(sc.outputTranscription.text);
    }
}

// Transcript helpers
function appendUserTranscript(t){if(!t.trim())return;if(welcomeEl)welcomeEl.style.display='none';finalizeBotMsg();if(!userMsgEl){userMsgEl=document.createElement('div');userMsgEl.className='msg-row user';userMsgEl.innerHTML=`<div class="msg-avatar">🧑</div><div><div class="msg-bubble"></div><div class="msg-time">${timeNow()}</div></div>`;chatBox.insertBefore(userMsgEl,typingEl)}pendingUserText+=t;userMsgEl.querySelector('.msg-bubble').textContent=pendingUserText;chatBox.scrollTop=chatBox.scrollHeight}
function finalizeUserMsg(){if(userMsgEl){userMsgEl=null;pendingUserText=''}}
function appendBotTranscript(t){if(!t.trim())return;finalizeUserMsg();if(!botMsgEl){botMsgEl=document.createElement('div');botMsgEl.className='msg-row bot';botMsgEl.innerHTML=`<div class="msg-avatar">M</div><div><div class="msg-bubble"></div><div class="msg-time">${timeNow()}</div></div>`;chatBox.insertBefore(botMsgEl,typingEl)}pendingBotText+=t;botMsgEl.querySelector('.msg-bubble').textContent=pendingBotText;chatBox.scrollTop=chatBox.scrollHeight}
function finalizeBotMsg(){if(botMsgEl){botMsgEl=null;pendingBotText=''}}

// Mic capture via AudioWorklet
async function startMicCapture(){
    try{
        micStream=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
        try{audioCtx=new AudioContext({sampleRate:16000})}catch(e){audioCtx=new AudioContext()}
        const src=audioCtx.createMediaStreamSource(micStream);
        const actualRate=audioCtx.sampleRate;
        const code=`class P extends AudioWorkletProcessor{process(i){if(i[0].length>0){const d=new Float32Array(i[0][0].length);d.set(i[0][0]);this.port.postMessage(d)}return true}}registerProcessor('p',P);`;
        await audioCtx.audioWorklet.addModule(URL.createObjectURL(new Blob([code],{type:'application/javascript'})));
        workletNode=new AudioWorkletNode(audioCtx,'p');
        let buf=new Float32Array(0);
        workletNode.port.onmessage=(e)=>{
            if(!liveActive||ws?.readyState!==WebSocket.OPEN)return;
            let pcm=e.data;
            if(actualRate!==16000)pcm=downsample(pcm,actualRate,16000);
            const nb=new Float32Array(buf.length+pcm.length);nb.set(buf);nb.set(pcm,buf.length);buf=nb;
            if(buf.length>=2048){
                const i16=new Int16Array(buf.length);for(let i=0;i<buf.length;i++){const s=Math.max(-1,Math.min(1,buf[i]));i16[i]=s<0?s*0x8000:s*0x7FFF}
                let b='';const u8=new Uint8Array(i16.buffer);for(let i=0;i<u8.length;i++)b+=String.fromCharCode(u8[i]);
                ws.send(JSON.stringify({realtime_input:{media_chunks:[{data:btoa(b),mime_type:"audio/pcm;rate=16000"}]}}));
                buf=new Float32Array(0);
            }
        };
        src.connect(workletNode);workletNode.connect(audioCtx.destination);
        console.log('🎤 Mic capture:',actualRate,'→ 16000 Hz');
    }catch(e){console.error('Mic error:',e);statusEl.textContent='❌ Mic access denied';stopLiveMode()}
}

function downsample(b,from,to){if(from===to)return b;const r=from/to,n=Math.floor(b.length/r),o=new Float32Array(n);for(let i=0;i<n;i++)o[i]=b[Math.floor(i*r)];return o}

// Audio playback
function playAudioChunk(b64,mime){
    let sr=24000;const m=mime?.match(/rate=(\d+)/);if(m)sr=parseInt(m[1]);
    const bin=atob(b64),bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    const i16=new Int16Array(bytes.buffer),f32=new Float32Array(i16.length);for(let i=0;i<i16.length;i++)f32[i]=i16[i]/32768;
    if(!playCtx||playCtx.state==='closed')playCtx=new AudioContext({sampleRate:sr});
    const buf=playCtx.createBuffer(1,f32.length,sr);buf.copyToChannel(f32,0);
    const s=playCtx.createBufferSource();s.buffer=buf;s.connect(playCtx.destination);
    const now=playCtx.currentTime,st=Math.max(now+0.01,nextPlayTime);s.start(st);nextPlayTime=st+buf.duration;
}
function clearPlayback(){nextPlayTime=0;if(playCtx&&playCtx.state!=='closed'){playCtx.close().catch(()=>{});playCtx=null}}

function stopLiveMode(){
    liveActive=false;liveMode=false;
    micBtn.classList.remove('active','listening');
    if(ws){try{ws.close()}catch(e){}ws=null}
    if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null}
    if(workletNode){workletNode.disconnect();workletNode=null}
    if(audioCtx&&audioCtx.state!=='closed'){audioCtx.close().catch(()=>{});audioCtx=null}
    clearPlayback();finalizeUserMsg();finalizeBotMsg();
}


// ======================================================================
//  VOICE MODE — Simple & Reliable
//  State: LISTENING → PROCESSING → SPEAKING → LISTENING
// ======================================================================
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recognition=null, recognitionRunning=false, restartTimer=null;
let lastQuery='', lastQueryTime=0; // duplicate detection
let chromeFix=null; // Chrome speech bug workaround

function startVoiceMode(){
    if(!SR){statusEl.textContent='❌ No speech recognition support';return}
    voiceModeOn=true;
    micBtn.classList.add('listening');
    statusEl.textContent='👂 Listening...';

    if(!recognition){
        recognition=new SR();
        recognition.lang='en-US';
        recognition.interimResults=false;
        recognition.continuous=false;

        recognition.onstart=()=>{ recognitionRunning=true; micBtn.classList.add('listening'); };

        recognition.onresult=(e)=>{
            recognitionRunning=false;
            const text=e.results[0][0].transcript.trim();
            if(!text){ restart(100); return; }

            // Duplicate check — same text within 5 sec = ignore
            if(text===lastQuery && Date.now()-lastQueryTime<5000){ restart(200); return; }

            // Stop command while speaking
            if(isBotSpeaking){
                if(/^(stop|ok|okay|enough|bas|ruko|wait|pause)\.?$/i.test(text)){
                    speechSynthesis.cancel(); isBotSpeaking=false; clearInterval(chromeFix);
                    statusEl.textContent='👂 Listening...';
                    restart(200); return;
                }
                speechSynthesis.cancel(); isBotSpeaking=false; clearInterval(chromeFix);
            }

            // Don't process if already processing
            if(isProcessing){ restart(200); return; }

            lastQuery=text; lastQueryTime=Date.now();
            processVoice(text);
        };

        recognition.onerror=(e)=>{
            recognitionRunning=false;
            if(e.error==='not-allowed'){stopAll();return}
            if(e.error!=='aborted') restart(e.error==='no-speech'?100:300);
        };

        recognition.onend=()=>{
            recognitionRunning=false;
            if(voiceModeOn && !isBotSpeaking && !isProcessing) restart(100);
        };
    }
    startRec();
}

function startRec(){
    if(!voiceModeOn||!recognition||isProcessing||isBotSpeaking||recognitionRunning) return;
    clearTimeout(restartTimer);
    try{
        recognition.start();
        statusEl.textContent='👂 Listening...';
    }catch(e){
        try{recognition.abort()}catch(x){}
        recognitionRunning=false;
        restart(300);
    }
}

function stopRec(){
    clearTimeout(restartTimer);
    try{if(recognitionRunning){recognition.abort();recognitionRunning=false}}catch(e){}
}

function restart(ms){
    clearTimeout(restartTimer);
    if(!voiceModeOn) return;
    restartTimer=setTimeout(()=>startRec(), ms);
}

// Process voice → get AI response → speak it → listen again
async function processVoice(text){
    if(isProcessing) return; // LOCK — prevent double call
    isProcessing=true;
    stopRec();
    micBtn.classList.remove('listening');
    micBtn.classList.add('active');
    addMsg(text,'user');
    statusEl.textContent='🤔 Thinking...';

    try{
        const res=await fetch('/chat',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({message:text, session_id:sessionId})
        });
        const data=await res.json();

        if(data.error){
            isProcessing=false;
            addMsg('⚠️ '+data.error,'bot');
            restart(200);
            return;
        }

        sessionId=data.session_id;
        addMsg(data.response,'bot');

        // Speak the response — with Chrome double-speak fix
        speechSynthesis.cancel();
        clearInterval(chromeFix);

        // Small delay to ensure cancel() is fully done
        await new Promise(r=>setTimeout(r,50));

        const u=new SpeechSynthesisUtterance(data.response);
        if(selectedVoice) u.voice=selectedVoice;
        u.rate=1.2; u.pitch=0.95;
        isBotSpeaking=true;
        isProcessing=false;
        micBtn.classList.remove('active');
        statusEl.textContent='🔊 Speaking...';

        // Chrome bug fix: pause/resume keeps synthesis alive, prevents restart
        chromeFix=setInterval(()=>{
            if(speechSynthesis.speaking){ speechSynthesis.pause(); speechSynthesis.resume(); }
            else clearInterval(chromeFix);
        },5000);

        u.onend=()=>{
            isBotSpeaking=false; clearInterval(chromeFix);
            if(voiceModeOn){ micBtn.classList.add('listening'); restart(300); }
            else{ micBtn.classList.remove('active','listening'); statusEl.textContent=''; }
        };
        u.onerror=()=>{
            isBotSpeaking=false; clearInterval(chromeFix);
            if(voiceModeOn){ micBtn.classList.add('listening'); restart(300); }
            else{ micBtn.classList.remove('active','listening'); statusEl.textContent=''; }
        };

        speechSynthesis.speak(u);

    }catch(e){
        isProcessing=false;
        addMsg('⚠️ Connection error','bot');
        restart(300);
    }
}


// ======================================================================
//  TEXT CHAT (always works)
// ======================================================================
async function sendText(text){
    if(!text||isProcessing)return;speechSynthesis.cancel();isBotSpeaking=false;
    isProcessing=true;addMsg(text,'user');showTyping(true);
    try{
        const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,session_id:sessionId})});
        const data=await res.json();isProcessing=false;showTyping(false);
        if(data.error)addMsg('⚠️ '+data.error,'bot');
        else{sessionId=data.session_id;addMsg(data.response,'bot');const u=new SpeechSynthesisUtterance(data.response);if(selectedVoice)u.voice=selectedVoice;u.rate=1.3;u.pitch=0.95;speechSynthesis.speak(u)}
    }catch(e){isProcessing=false;showTyping(false);addMsg('⚠️ Error','bot')}
}


// ======================================================================
//  UI HANDLERS
// ======================================================================
function stopAll(){
    voiceModeOn=false; stopRec(); stopLiveMode();
    speechSynthesis.cancel(); isBotSpeaking=false; isProcessing=false;
    micBtn.classList.remove('active','listening'); statusEl.textContent='';
}

micBtn.addEventListener('click',()=>{
    if(liveActive||voiceModeOn){ stopAll(); return; }
    startVoiceMode();
});

sendBtn.addEventListener('click',()=>{const t=msgInput.value.trim();msgInput.value='';if(t)sendText(t)});
msgInput.addEventListener('keydown',e=>{if(e.key==='Enter'){const t=msgInput.value.trim();msgInput.value='';if(t)sendText(t)}});
document.querySelectorAll('.welcome-chip').forEach(c=>c.addEventListener('click',()=>sendText(c.getAttribute('data-q'))));

clearBtn.addEventListener('click',()=>{
    stopAll();chatBox.querySelectorAll('.msg-row').forEach(m=>m.remove());
    if(welcomeEl)welcomeEl.style.display='';
    if(sessionId)fetch('/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId})});
    sessionId=null;
});

document.addEventListener('keydown',e=>{
    if(e.code==='Space'&&isBotSpeaking&&document.activeElement!==msgInput){
        e.preventDefault();speechSynthesis.cancel();isBotSpeaking=false;
        statusEl.textContent='👂 Listening...';
    }
});
</script>
